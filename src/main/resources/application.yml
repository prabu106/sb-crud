server:
  port: 8082

spring:
  application:
    name: demo crud app
  datasource:
    url: jdbc:mysql://localhost:3306/crudDB
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect